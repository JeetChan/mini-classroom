<script src="../js/data.js"></script>
<script src="../js/storage.js"></script>
<script>
function renderSentences() {
  const container = document.getElementById('sentenceCards');
  if (!container) return;

  ChineseData.sentences.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sentence-card';
    div.innerHTML = `
      <div class="sentence-pattern">${s.pattern}</div>
      <span class="sentence-structure">${s.structure}</span>
      <div style="margin-bottom:8px;font-size:0.78rem;color:#636E72;font-weight:600;">课文例句</div>
      <div class="sentence-example">${s.example}</div>
      <div style="margin-bottom:8px;font-size:0.78rem;color:#636E72;font-weight:600;">仿写练习</div>
      <div class="sentence-practices">
        ${s.practices.map(p => `<div class="sentence-practice">${p}</div>`).join('')}
      </div>
      <div class="quiz-section">
        <div class="quiz-q">小测：${s.quiz.question}</div>
        <div class="quiz-options">
          ${s.quiz.options.map((opt, i) => `
            <button class="quiz-option" data-idx="${i}" data-correct="${s.quiz.correctAnswer}" onclick="checkAnswer(this)">
              ${String.fromCharCode(65+i)}. ${opt}
            </button>
          `).join('')}
        </div>
        <div class="quiz-feedback"></div>
      </div>
    `;
    container.appendChild(div);
  });
}

function checkAnswer(btn) {
  const correct = parseInt(btn.dataset.correct, 10);
  const idx = parseInt(btn.dataset.idx, 10);
  const parent = btn.closest('.quiz-options');
  const feedback = btn.closest('.quiz-section').querySelector('.quiz-feedback');
  if (!parent || !feedback) return;
  parent.querySelectorAll('.quiz-option').forEach((b, i) => {
    b.classList.add('disabled');
    if (i === correct) b.classList.add('correct');
    else if (i === idx && idx !== correct) b.classList.add('wrong');
  });
  if (idx === correct) {
    feedback.textContent = '✅ 正确！学会这个句式了！';
    feedback.className = 'quiz-feedback show correct-msg';
  } else {
    feedback.textContent = '❌ 正确答案是 ' + String.fromCharCode(65+correct) + '，再读读例句吧。';
    feedback.className = 'quiz-feedback show wrong-msg';
  }
}

renderSentences();
</script>
