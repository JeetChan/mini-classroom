  <div class="footer-tagline">词语是语文的砖瓦</div>

</footer>

<script src="../js/data.js"></script>
<script src="../js/storage.js"></script>
<script>
function renderVocab() {
  const tabsEl = document.getElementById('vocabTabs');
  const panelsEl = document.getElementById('vocabPanels');
  if (!tabsEl || !panelsEl) return;

  const typeColors = {
    'AABB': '#4CAF50', 'ABB': '#FF6B35', 'ABAB': '#9C27B0',
    '拟声词': '#2196F3', '四季': '#F57C00'
  };

  ChineseData.vocab.forEach((cat, idx) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = `vocab-tab${idx === 0 ? ' active' : ''}`;
    tab.textContent = cat.category;
    tab.dataset.idx = idx;
    tab.onclick = () => switchTab(idx);
    tabsEl.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = `tab-panel${idx === 0 ? ' active' : ''}`;
    panel.id = `panel_${idx}`;
    panel.innerHTML = `
      <div style="margin-bottom:18px;padding:12px 18px;background:#FFF0EB;border-radius:12px;font-size:0.88rem;color:#E55A2B;">
        <b>结构特点：</b>${cat.description}
      </div>
      <div class="vocab-words" id="words_${idx}"></div>
      <div class="quiz-section" style="margin-top:28px;background:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow);">
        <div class="quiz-q">小测验：${cat.quiz.question}</div>
        <div class="quiz-options">
          ${cat.quiz.options.map((opt, i) => `
            <button class="quiz-option" data-idx="${i}" data-correct="${cat.quiz.correctAnswer}" onclick="checkAnswer(this)">
              ${String.fromCharCode(65+i)}. ${opt}
            </button>
          `).join('')}
        </div>
        <div class="quiz-feedback"></div>
      </div>
    `;
    panelsEl.appendChild(panel);

    // Render words
    const wordsEl = panel.querySelector(`#words_${idx}`);
    cat.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'vocab-word';
      div.innerHTML = `
        <div class="word-text">${item.word}</div>
        <span class="word-type">${item.type}</span>
        <div class="word-usage">${item.usage}</div>
      `;
      wordsEl.appendChild(div);
    });
  });
}

function switchTab(idx) {
  document.querySelectorAll('.vocab-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const tab = document.querySelector(`.vocab-tab[data-idx="${idx}"]`);
  const panel = document.getElementById(`panel_${idx}`);
  if (tab) tab.classList.add('active');
  if (panel) panel.classList.add('active');
}

function checkAnswer(btn) {
  const correct = parseInt(btn.dataset.correct, 10);
  const idx = parseInt(btn.dataset.idx, 10);
  const parent = btn.closest('.quiz-options');
  const feedback = btn.closest('.quiz-section').querySelector('.quiz-feedback');
  if (!parent || !feedback) return;
  parent.querySelectorAll('.quiz-option').forEach((b, i) => {
    b.classList.add('disabled');
    if (i === correct) b.classList.add('correct');
    else if (i === idx && idx !== correct) b.classList.add('wrong');
  });
  if (idx === correct) {
    feedback.textContent = '✅ 正确！';
    feedback.className = 'quiz-feedback show correct-msg';
  } else {
    feedback.textContent = '❌ 正确答案是 ' + String.fromCharCode(65+correct) + '。';
    feedback.className = 'quiz-feedback show wrong-msg';
  }
}

renderVocab();
</script>
</body>
