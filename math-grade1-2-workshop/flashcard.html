<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">📐 一年级数学</a>
      <div class="nav-links">

        <a href="roots.html" class="nav-link">索引</a>
        <a href="progress.html" class="nav-link">进度</a>
      </div>
    </div>
  </nav>

  <!-- 闪卡区域 -->
  <div class="flashcard-container">
    <div class="flashcard-header">
      <h1 class="flashcard-title" id="flashcardTitle">闪卡复习</h1>
      <div class="flashcard-progress" id="flashcardProgress"></div>
    </div>

    <!-- 闪卡 -->
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-inner" id="flashcardInner">
        <!-- 正面：显示知识点名称 -->
        <div class="flashcard-front">
          <div class="flashcard-number" id="cardNumber"></div>
          <div class="flashcard-root" id="cardRoot"></div>
          <div class="flashcard-meaning" id="cardMeaning"></div>
          <div class="flashcard-hint">点击翻转查看答案</div>
        </div>

        <!-- 背面：显示详细说明 -->
        <div class="flashcard-back">
          <div class="flashcard-origin" id="cardOrigin"></div>
          <div class="flashcard-description" id="cardDescription"></div>
        </div>
      </div>
    </div>

    <!-- 导航按钮 -->
    <div class="flashcard-navigation">
      <button class="btn-nav" id="btnPrev" onclick="prevCard()">← 上一个</button>
      <button class="btn-nav" onclick="flipCard()">翻转卡片</button>
      <button class="btn-nav" id="btnNext" onclick="nextCard()">下一个 →</button>
    </div>

    <!-- 快捷键提示 -->
    <div class="text-center mt-2" style="font-size: 0.85rem; color: var(--color-text-muted);">
      快捷键：← → 翻页 | 空格 翻转
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/siteConfig.js"></script>
  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    // 当前闪卡索引
    let currentIndex = 0;
    let isFlipped = false;

    /**
     * 安全地设置元素的textContent
     */
    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) {
        el.textContent = text;
      }
    }

    /**
     * 翻转卡片
     */
    function flipCard() {
      const inner = document.getElementById('flashcardInner');
      if (!inner) return;

      isFlipped = !isFlipped;
      if (isFlipped) {
        inner.classList.add('flipped');
      } else {
        inner.classList.remove('flipped');
      }
    }

    /**
     * 渲染当前闪卡
     */
    function renderCurrentCard() {
      if (!WordRoots || WordRoots.length === 0) return;
      if (currentIndex < 0 || currentIndex >= WordRoots.length) return;

      const item = WordRoots[currentIndex];

      // 更新进度
      safeSetText('flashcardProgress', `${currentIndex + 1} / ${WordRoots.length}`);

      // 更新卡片内容（正面）
      safeSetText('cardNumber', `知识点 #${item.id}`);
      safeSetText('cardRoot', item.root);
      safeSetText('cardMeaning', item.meaning);

      // 更新卡片内容（背面）
      safeSetText('cardOrigin', item.origin);
      safeSetText('cardDescription', item.description);

      // 确保卡片回到正面
      isFlipped = false;
      const inner = document.getElementById('flashcardInner');
      if (inner) {
        inner.classList.remove('flipped');
      }

      // 更新导航按钮状态
      updateNavigation();
    }

    /**
     * 切换到上一个闪卡
     */
    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCurrentCard();
      }
    }

    /**
     * 切换到下一个闪卡
     */
    function nextCard() {
      if (WordRoots && currentIndex < WordRoots.length - 1) {
        currentIndex++;
        renderCurrentCard();
      }
    }

    /**
     * 更新导航按钮状态
     */
    function updateNavigation() {
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');

      if (btnPrev) {
        btnPrev.disabled = currentIndex === 0;
      }

      if (btnNext) {
        btnNext.disabled = !WordRoots || currentIndex === WordRoots.length - 1;
      }
    }

    /**
     * 键盘快捷键
     */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevCard();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        nextCard();
      } else if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        flipCard();
      }
    });

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      if (!WordRoots || WordRoots.length === 0) {
        safeSetText('flashcardTitle', '暂无知识点数据');
        const card = document.getElementById('flashcard');
        if (card) {
          card.style.display = 'none';
        }
        return;
      }

      // 尝试从URL参数获取起始索引
      const params = new URLSearchParams(window.location.search);
      const startId = params.get('id');
      if (startId) {
        const idx = WordRoots.findIndex(item => item.id === parseInt(startId));
        if (idx !== -1) {
          currentIndex = idx;
        }
      }

      renderCurrentCard();
    });
  </script>
</body>
</html>
